name: Deploy static GitHub Pages snapshot

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/polymarket_watch?schema=public
      NEXT_PUBLIC_STATIC_EXPORT: "1"
      GITHUB_PAGES: "true"
      GITHUB_PAGES_REPO: poly
      DEEPSEEK_BASE_URL: https://api.deepseek.com
      DEEPSEEK_MODEL: deepseek-v4-flash
      # ビルド時のAI予想生成に使用（サーバー側のみ・公開バンドルには出ない）。
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      # AI(チャット/評価)を公開版でも動かすためのプロキシURL。
      # 鍵を持つバックエンド(このアプリをVercel等にデプロイしたもの)のURLを
      # リポジトリの Variables に AI_API_BASE として登録すると、公開サイトから
      # そのバックエンド経由でAIが動く（鍵は公開サイトに出ない）。未設定なら従来どおり案内表示。
      NEXT_PUBLIC_AI_API_BASE: ${{ vars.AI_API_BASE }}
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: polymarket_watch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d polymarket_watch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout application
        uses: actions/checkout@v6
        with:
          ref: main

      - name: Checkout live connection registry
        uses: actions/checkout@v6
        with:
          ref: live
          path: .live-registry
          sparse-checkout: |
            connection.json
            dashboard.json
          sparse-checkout-cone-mode: false

      - name: Stage live connection registry
        run: |
          cp .live-registry/connection.json public/live-connection.json
          cp .live-registry/dashboard.json public/live-dashboard.json
          rm -rf .live-registry

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Initialize PostgreSQL schema
        run: npm run db:migrate

      - name: Build static snapshot
        run: npm run build:pages

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
