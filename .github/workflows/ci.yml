name: Validate Next.js app

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: file:./dev.db
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Setup Python analytics runtime
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install analytics dependencies
        run: python -m pip install -r requirements-analytics.txt

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Test verified Parquet archive
        run: python scripts/test_columnar_archive.py

      - name: Build
        run: npm run build
