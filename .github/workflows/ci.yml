name: Validate Next.js app

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/polymarket_watch?schema=public
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: polymarket_watch
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d polymarket_watch"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Initialize PostgreSQL schema
        run: npm run db:migrate

      - name: Setup Python analytics runtime
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install analytics dependencies
        run: python -m pip install -r requirements-analytics.txt

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Test verified Parquet archive
        run: python scripts/test_columnar_archive.py

      - name: Build
        run: npm run build
